<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>フラッシュカードメーカー</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --panel: #fffdf8;
      --ink: #1f2933;
      --muted: #667085;
      --line: #ddd6ca;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --accent: #c2410c;
      --card: #ffffff;
      --shadow: 0 18px 50px rgba(43, 37, 30, .14);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.22)),
        var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button, textarea, input, select {
      font: inherit;
      color: inherit;
    }

    button, select, input[type="text"] {
      height: 40px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 13px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    button:hover { transform: translateY(-1px); border-color: #b8aa96; }
    button:active { transform: translateY(0); }
    button.primary { background: var(--brand); color: white; border-color: var(--brand); }
    button.primary:hover { background: var(--brand-dark); }
    button.warning { color: var(--accent); }
    button.active { background: #d9f3ef; border-color: var(--brand); color: #0b4f49; }

    select, input[type="text"] {
      padding: 0 10px;
      min-width: 86px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,253,248,.88);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 190px;
    }

    .title strong { font-size: 18px; }
    .title span { font-size: 12px; color: var(--muted); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(330px, 420px) 1fr;
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }

    .editor {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      min-height: 0;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }

    .section h2 {
      margin: 0 0 9px;
      font-size: 14px;
    }

    .samples, .save-row, .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    textarea {
      width: 100%;
      min-height: 240px;
      height: 100%;
      resize: vertical;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px;
      line-height: 1.55;
      tab-size: 2;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .stage {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    .timer-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .timer-controls label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--ink);
      font-size: 13px;
    }

    .card-wrap {
      position: relative;
      min-height: 360px;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .floating-display-controls {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 4;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .floating-display-controls button {
      min-width: 92px;
      background: rgba(255, 255, 255, .56);
      border-color: rgba(31, 41, 51, .16);
      color: rgba(31, 41, 51, .72);
      box-shadow: 0 8px 22px rgba(31, 41, 51, .08);
      backdrop-filter: blur(10px);
    }

    .floating-display-controls button:hover {
      background: rgba(255, 255, 255, .82);
      color: var(--ink);
    }

    .floating-display-controls button.active {
      background: rgba(217, 243, 239, .72);
      border-color: rgba(15, 118, 110, .65);
      color: #0b4f49;
    }

    .fullscreen-controls {
      display: none;
    }

    .flashcard {
      width: 100%;
      min-height: min(calc(100vh - 190px), 720px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
    }

    .flashcard.double {
      grid-template-rows: 1fr auto 1fr;
    }

    .face {
      min-height: 160px;
      display: grid;
      place-items: center;
      padding: clamp(20px, 4vw, 46px);
      text-align: center;
    }

    .face.front { background: #fff7c7; }
    .face.back { background: #f3fbfa; }

    .label {
      display: none;
    }

    .word {
      max-width: 100%;
      overflow-wrap: anywhere;
      font-size: clamp(34px, 7vw, 86px);
      line-height: 1.14;
      font-weight: 800;
    }

    .divider {
      height: 1px;
      background: var(--line);
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }

    .nav .center {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .progress {
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .fullscreen .topbar,
    .fullscreen .editor,
    .fullscreen .status {
      display: none;
    }

    .fullscreen .main {
      grid-template-columns: 1fr;
      padding: 0;
      min-height: 100vh;
    }

    .fullscreen .stage {
      grid-template-rows: 1fr auto;
      min-height: 100vh;
      padding: 16px;
      background: #1f2933;
    }

    .fullscreen .card-wrap {
      padding: 0;
      min-height: 0;
    }

    .fullscreen .fullscreen-controls {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      transform: none;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      max-width: none;
      padding: 8px;
      border: 1px solid rgba(31, 41, 51, .14);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .54);
      box-shadow: 0 10px 26px rgba(31, 41, 51, .10);
      backdrop-filter: blur(12px);
    }

    .fullscreen .fullscreen-controls button,
    .fullscreen .fullscreen-controls select {
      height: 40px;
      background: rgba(255, 255, 255, .64);
    }

    .fullscreen .fullscreen-controls button {
      min-width: 88px;
    }

    .fullscreen .fullscreen-controls button.primary {
      background: rgba(255, 255, 255, .78);
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    .fullscreen .fullscreen-controls label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(31, 41, 51, .74);
      white-space: nowrap;
    }

    .fullscreen .floating-display-controls {
      top: 106px;
      left: 10px;
      right: 10px;
      justify-content: center;
    }

    .fullscreen .floating-display-controls button {
      flex: 1 1 104px;
      max-width: 180px;
      height: 42px;
      background: rgba(255, 255, 255, .66);
    }

    .fullscreen .flashcard {
      width: 100%;
      min-height: calc(100vh - 96px);
      border: 0;
    }

    .fullscreen .nav {
      background: rgba(255,255,255,.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
    }

    @media (max-width: 880px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .main { grid-template-columns: 1fr; }
      .editor { grid-template-rows: auto auto auto auto; }
      .flashcard { min-height: 430px; }
      .nav { grid-template-columns: 1fr; }
      .nav > button { width: 100%; }
      button, select, input[type="text"] { min-height: 44px; }
      .floating-display-controls {
        left: 10px;
        right: 10px;
        justify-content: center;
      }
      .floating-display-controls button {
        flex: 1 1 96px;
      }
    }

    @media (max-width: 520px) {
      .main { padding: 12px; }
      .toolbar button, .toolbar select { flex: 1 1 calc(50% - 8px); }
      .fullscreen .fullscreen-controls {
        left: 10px;
        right: 10px;
        transform: none;
        max-width: none;
      }
      .fullscreen .fullscreen-controls button {
        flex: 1 1 calc(50% - 8px);
      }
      .fullscreen .fullscreen-controls label {
        flex: 1 1 calc(50% - 8px);
        justify-content: center;
      }
      .fullscreen .floating-display-controls {
        top: 158px;
      }
      .word { font-size: clamp(30px, 12vw, 58px); }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="title">
        <strong>フラッシュカードメーカー</strong>
        <span>貼り付けた言葉から、すぐカードを作成</span>
      </div>
      <div class="toolbar" aria-label="メニュー">
        <button id="shuffleBtn">ランダム</button>
        <button id="frontOnlyBtn">表のみ</button>
        <button id="backOnlyBtn">裏のみ</button>
        <button id="bothBtn" class="active">表と裏</button>
        <button id="autoBtn">自動</button>
        <button id="manualBtn" class="active">手動</button>
        <button id="fullscreenBtn" class="primary">全画面</button>
      </div>
    </header>

    <main class="main">
      <aside class="editor">
        <section class="section">
          <h2>見本</h2>
          <div class="samples">
            <button data-sample="prefectures">県名と県庁所在地</button>
            <button data-sample="months">1月から12月の英語</button>
            <button data-sample="weekdays">日曜から土曜の英語</button>
            <button data-sample="stations">主要な駅名と県名</button>
            <button data-sample="chemistry">化学式</button>
            <button data-sample="japaneseMonths">和暦の月</button>
            <button data-sample="musicSymbols">音楽記号</button>
            <button data-sample="kobunWords">古文単語</button>
            <button data-sample="yojijukugo">四字熟語</button>
            <button data-sample="idioms">慣用句</button>
            <button data-sample="proverbs">ことわざ</button>
            <button data-sample="history">日本の歴史の年代と出来事</button>
          </div>
        </section>

        <section class="section">
          <h2>保存モード</h2>
          <div class="save-row">
            <input id="deckName" type="text" placeholder="保存名">
            <button id="saveBtn" class="primary">保存</button>
            <select id="savedDecks" aria-label="保存したカード"></select>
            <button id="loadBtn">読込</button>
            <button id="deleteBtn" class="warning">削除</button>
          </div>
        </section>

        <section class="section">
          <h2>カード入力</h2>
          <textarea id="sourceText" spellcheck="false"></textarea>
          <p class="hint">1行に「表,裏」または「表 タブ 裏」。スプレッドシートから2列を貼り付けても使えます。</p>
        </section>

        <section class="section">
          <div class="editor-actions">
            <button id="makeBtn" class="primary">カード作成</button>
            <button id="clearBtn">入力を空にする</button>
          </div>
          <p class="hint" id="parseMessage"></p>
        </section>
      </aside>

      <section class="stage">
        <div class="status">
          <span id="deckInfo">0枚</span>
          <div class="timer-controls">
            <label>表<select id="frontSeconds"></select>秒</label>
            <label>裏<select id="backSeconds"></select>秒</label>
          </div>
        </div>

        <div class="card-wrap">
          <div class="fullscreen-controls" aria-label="全画面メニュー">
            <button id="fsStartBtn" class="primary">スタート</button>
            <button id="fsShuffleBtn">シャッフル</button>
            <button id="fsAutoBtn">自動</button>
            <button id="fsManualBtn" class="active">手動</button>
            <label>表<select id="fsFrontSeconds"></select>秒</label>
            <label>裏<select id="fsBackSeconds"></select>秒</label>
          </div>
          <div class="floating-display-controls" aria-label="表示切替">
            <button id="flipBtn">表→裏</button>
            <button id="floatFrontOnlyBtn">表のみ</button>
            <button id="floatBackOnlyBtn">裏のみ</button>
          </div>
          <article class="flashcard" id="card">
            <div class="face front" id="frontFace">
              <div>
                <div class="label">表</div>
                <div class="word" id="frontWord">カードを作成してください</div>
              </div>
            </div>
            <div class="divider" id="divider"></div>
            <div class="face back" id="backFace">
              <div>
                <div class="label">裏</div>
                <div class="word" id="backWord">左の見本から始められます</div>
              </div>
            </div>
          </article>
        </div>

        <nav class="nav" aria-label="カード操作">
          <button id="prevBtn">前へ</button>
          <div>
            <div class="progress" id="progress">0 / 0</div>
            <div class="center">
              <button id="restartBtn">最初から</button>
            </div>
          </div>
          <button id="nextBtn">次へ</button>
        </nav>
      </section>
    </main>
  </div>

    const storageKey = "flashcard-maker-decks-v1";
    const els = {
      app: document.getElementById("app"),
      sourceText: document.getElementById("sourceText"),
      parseMessage: document.getElementById("parseMessage"),
      frontWord: document.getElementById("frontWord"),
      backWord: document.getElementById("backWord"),
      card: document.getElementById("card"),
      cardWrap: document.querySelector(".card-wrap"),
      flipBtn: document.getElementById("flipBtn"),
      floatFrontOnlyBtn: document.getElementById("floatFrontOnlyBtn"),
      floatBackOnlyBtn: document.getElementById("floatBackOnlyBtn"),
      frontFace: document.getElementById("frontFace"),
      backFace: document.getElementById("backFace"),
      divider: document.getElementById("divider"),
      deckInfo: document.getElementById("deckInfo"),
      progress: document.getElementById("progress"),
      deckName: document.getElementById("deckName"),
      savedDecks: document.getElementById("savedDecks"),
      frontSeconds: document.getElementById("frontSeconds"),
      backSeconds: document.getElementById("backSeconds"),
      fsFrontSeconds: document.getElementById("fsFrontSeconds"),
      fsBackSeconds: document.getElementById("fsBackSeconds")
    };

    let cards = [];
    let index = 0;
    let displayMode = "both";
    let playMode = "manual";
    let studyDirection = "frontToBack";
    let autoTimer = null;
    let autoPhase = "front";
    let audioContext = null;

    function readyAudio() {
      try {
        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === "suspended") audioContext.resume();
      } catch {
      }
    }

    function playTone(kind = "move") {
      try {
        readyAudio();
        if (!audioContext) return;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const now = audioContext.currentTime;
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(kind === "flip" ? 620 : 440, now);
        oscillator.frequency.exponentialRampToValueAtTime(kind === "flip" ? 820 : 520, now + 0.07);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.045, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);
        oscillator.connect(gain).connect(audioContext.destination);
        oscillator.start(now);
        oscillator.stop(now + 0.12);
      } catch {
      }
    }

    function fillSeconds() {
      for (let i = 1; i <= 5; i += 1) {
        els.frontSeconds.add(new Option(i, i));
        els.backSeconds.add(new Option(i, i));
        els.fsFrontSeconds.add(new Option(i, i));
        els.fsBackSeconds.add(new Option(i, i));
      }
      els.frontSeconds.value = "2";
      els.backSeconds.value = "2";
      els.fsFrontSeconds.value = "2";
      els.fsBackSeconds.value = "2";
    }

    function parseCards(text) {
      return text.split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const parts = line.includes("\t") ? line.split("\t") : line.split(",");
          const front = (parts[0] || "").trim();
          const back = parts.slice(1).join(parts.length > 2 ? "," : "").trim();
          return front && back ? { front, back } : null;
        })
        .filter(Boolean);
    }

    function makeCards() {
      cards = parseCards(els.sourceText.value);
      index = 0;
      autoPhase = firstPhase();
      stopAuto();
      render();
      els.parseMessage.textContent = cards.length ? `${cards.length}枚のカードを作成しました。` : "読み取れるカードがありません。";
      if (playMode === "auto" && cards.length) startAuto();
    }

    function currentCard() {
      return cards[index] || { front: "カードを作成してください", back: "左の見本から始められます" };
    }

    function render() {
      const card = currentCard();
      els.frontWord.textContent = card.front;
      els.backWord.textContent = card.back;
      els.deckInfo.textContent = `${cards.length}枚`;
      els.progress.textContent = cards.length ? `${index + 1} / ${cards.length}` : "0 / 0";

      const phaseBoth = displayMode === "both";
      const showFront = displayMode === "front" || (phaseBoth && autoPhase === "front");
      const showBack = displayMode === "back" || (phaseBoth && autoPhase === "back");
      els.frontFace.style.display = showFront ? "grid" : "none";
      els.backFace.style.display = showBack ? "grid" : "none";
      els.divider.style.display = showFront && showBack ? "block" : "none";
      els.card.classList.toggle("double", showFront && showBack);
      els.flipBtn.textContent = studyDirection === "frontToBack" ? "表→裏" : "裏→表";
      els.flipBtn.classList.toggle("active", displayMode === "both");
      els.floatFrontOnlyBtn.classList.toggle("active", displayMode === "front");
      els.floatBackOnlyBtn.classList.toggle("active", displayMode === "back");
    }

    function firstPhase() {
      if (displayMode === "back") return "back";
      if (displayMode === "front") return "front";
      return studyDirection === "backToFront" ? "back" : "front";
    }

    function answerPhase() {
      return firstPhase() === "front" ? "back" : "front";
    }

    function setDisplayMode(mode) {
      displayMode = mode;
      autoPhase = firstPhase();
      document.getElementById("frontOnlyBtn").classList.toggle("active", mode === "front");
      document.getElementById("backOnlyBtn").classList.toggle("active", mode === "back");
      document.getElementById("bothBtn").classList.toggle("active", mode === "both");
      render();
      if (playMode === "auto") restartAuto();
    }

    function setPlayMode(mode) {
      playMode = mode;
      readyAudio();
      document.getElementById("autoBtn").classList.toggle("active", mode === "auto");
      document.getElementById("manualBtn").classList.toggle("active", mode === "manual");
      document.getElementById("fsAutoBtn").classList.toggle("active", mode === "auto");
      document.getElementById("fsManualBtn").classList.toggle("active", mode === "manual");
      if (mode === "auto") startAuto();
      else stopAuto();
    }

    function nextCard() {
      if (!cards.length) return;
      index = (index + 1) % cards.length;
      autoPhase = firstPhase();
      playTone("move");
      render();
    }

    function prevCard() {
      if (!cards.length) return;
      index = (index - 1 + cards.length) % cards.length;
      autoPhase = firstPhase();
      playTone("move");
      render();
    }

    function stopAuto() {
      clearTimeout(autoTimer);
      autoTimer = null;
    }

    function startAuto() {
      stopAuto();
      if (!cards.length) return;
      autoPhase = firstPhase();
      tickAuto();
    }

    function restartAuto() {
      if (playMode === "auto") startAuto();
    }

    function tickAuto() {
      render();
      const delaySeconds = displayMode === "back" || autoPhase === "back" ? els.backSeconds.value : els.frontSeconds.value;
      const delay = Number(delaySeconds) * 1000;
      autoTimer = setTimeout(() => {
        if (displayMode === "front") {
          nextCard();
        } else if (displayMode === "back") {
          nextCard();
        } else if (autoPhase === firstPhase()) {
          autoPhase = answerPhase();
          playTone("flip");
          render();
        } else {
          nextCard();
        }
        tickAuto();
      }, delay);
    }

    function startFromFullscreen() {
      index = 0;
      autoPhase = firstPhase();
      render();
      setPlayMode("auto");
    }

    function advanceManualCard() {
      if (!cards.length) return;
      if (displayMode === "both" && autoPhase === firstPhase()) {
        autoPhase = answerPhase();
        playTone("flip");
        render();
        return;
      }
      nextCard();
    }

    function syncSeconds(source, target) {
      target.value = source.value;
      restartAuto();
    }

    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      index = 0;
      render();
      restartAuto();
    }

    function loadDecks() {
      try { return JSON.parse(localStorage.getItem(storageKey) || "{}"); }
      catch { return {}; }
    }

    function saveDecks(decks) {
      localStorage.setItem(storageKey, JSON.stringify(decks));
      refreshDeckList();
    }

    function refreshDeckList() {
      const decks = loadDecks();
      els.savedDecks.innerHTML = "";
      Object.keys(decks).sort().forEach(name => els.savedDecks.add(new Option(name, name)));
      if (!els.savedDecks.options.length) els.savedDecks.add(new Option("保存なし", ""));
    }

    function saveCurrentDeck() {
      const name = els.deckName.value.trim();
      if (!name) {
        els.parseMessage.textContent = "保存名を入力してください。";
        return;
      }
      const decks = loadDecks();
      decks[name] = els.sourceText.value;
      saveDecks(decks);
      els.savedDecks.value = name;
      els.parseMessage.textContent = `「${name}」を保存しました。`;
    }

    function loadSavedDeck() {
      const name = els.savedDecks.value;
      const decks = loadDecks();
      if (!name || !decks[name]) return;
      els.deckName.value = name;
      els.sourceText.value = decks[name];
      makeCards();
    }

    function deleteSavedDeck() {
      const name = els.savedDecks.value;
      if (!name) return;
      const decks = loadDecks();
      delete decks[name];
      saveDecks(decks);
      els.parseMessage.textContent = `「${name}」を削除しました。`;
    }

    document.querySelectorAll("[data-sample]").forEach(button => {
      button.addEventListener("click", () => {
        els.sourceText.value = samples[button.dataset.sample];
        els.deckName.value = button.textContent;
        makeCards();
      });
    });

    document.getElementById("makeBtn").addEventListener("click", makeCards);
    document.getElementById("clearBtn").addEventListener("click", () => {
      els.sourceText.value = "";
      cards = [];
      index = 0;
      stopAuto();
      render();
      els.parseMessage.textContent = "";
    });
    document.getElementById("shuffleBtn").addEventListener("click", shuffleCards);
    document.getElementById("fsShuffleBtn").addEventListener("click", shuffleCards);
    document.getElementById("frontOnlyBtn").addEventListener("click", () => setDisplayMode("front"));
    document.getElementById("backOnlyBtn").addEventListener("click", () => setDisplayMode("back"));
    document.getElementById("bothBtn").addEventListener("click", () => setDisplayMode("both"));
    document.getElementById("floatFrontOnlyBtn").addEventListener("click", () => setDisplayMode("front"));
    document.getElementById("floatBackOnlyBtn").addEventListener("click", () => setDisplayMode("back"));
    document.getElementById("autoBtn").addEventListener("click", () => setPlayMode("auto"));
    document.getElementById("manualBtn").addEventListener("click", () => setPlayMode("manual"));
    document.getElementById("fsStartBtn").addEventListener("click", startFromFullscreen);
    document.getElementById("fsAutoBtn").addEventListener("click", () => setPlayMode("auto"));
    document.getElementById("fsManualBtn").addEventListener("click", () => setPlayMode("manual"));
    document.getElementById("nextBtn").addEventListener("click", () => { nextCard(); restartAuto(); });
    document.getElementById("prevBtn").addEventListener("click", () => { prevCard(); restartAuto(); });
    document.getElementById("restartBtn").addEventListener("click", () => { index = 0; autoPhase = firstPhase(); render(); restartAuto(); });
    document.getElementById("flipBtn").addEventListener("click", () => {
      studyDirection = studyDirection === "frontToBack" ? "backToFront" : "frontToBack";
      displayMode = "both";
      autoPhase = firstPhase();
      document.getElementById("frontOnlyBtn").classList.remove("active");
      document.getElementById("backOnlyBtn").classList.remove("active");
      document.getElementById("bothBtn").classList.add("active");
      render();
      restartAuto();
      playTone("flip");
    });
    els.cardWrap.addEventListener("click", event => {
      if (playMode !== "manual") return;
      if (event.target.closest("button,select,input,textarea")) return;
      advanceManualCard();
    });
    document.getElementById("fullscreenBtn").addEventListener("click", () => els.app.classList.toggle("fullscreen"));
    document.getElementById("saveBtn").addEventListener("click", saveCurrentDeck);
    document.getElementById("loadBtn").addEventListener("click", loadSavedDeck);
    document.getElementById("deleteBtn").addEventListener("click", deleteSavedDeck);
    els.frontSeconds.addEventListener("change", () => syncSeconds(els.frontSeconds, els.fsFrontSeconds));
    els.backSeconds.addEventListener("change", () => syncSeconds(els.backSeconds, els.fsBackSeconds));
    els.fsFrontSeconds.addEventListener("change", () => syncSeconds(els.fsFrontSeconds, els.frontSeconds));
    els.fsBackSeconds.addEventListener("change", () => syncSeconds(els.fsBackSeconds, els.backSeconds));
    window.addEventListener("keydown", event => {
      if (event.target.matches("textarea,input,select")) return;
      if (event.key === "ArrowRight") { nextCard(); restartAuto(); }
      if (event.key === "ArrowLeft") { prevCard(); restartAuto(); }
      if (event.key === " ") { event.preventDefault(); playMode === "manual" ? advanceManualCard() : restartAuto(); }
      if (event.key === "Escape") els.app.classList.remove("fullscreen");
    });

    fillSeconds();
    refreshDeckList();
    els.sourceText.value = samples.prefectures;
    els.deckName.value = "県名と県庁所在地";
    makeCards();
  </script>
</body>
